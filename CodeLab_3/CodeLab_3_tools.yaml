# tools.yaml — MCP Toolbox Configuration for FroyoOS Agent
# Defines tools available to the Gemini agent
# Deploy to Cloud Run via Secret Manager

sources:
    alloydb-source:
        kind: "alloydb-postgres"
        project: "your-project-id"        # Replace with your GCP project ID
        region: "us-central1"
        cluster: "froyo-cluster"
        instance: "froyo-instance"
        database: "postgres"
        user: "postgres"
        password: "your-alloydb-password" # Replace with your AlloyDB password
        ipType: "private"

tools:
  check_allergens:
    kind: postgres-sql
    source: alloydb-source
    description: >
      Queries the federated BigQuery tables via AlloyDB to find allergens
      for a given froyo product. Uses HTAP architecture — analytical data
      from BigQuery accessed through AlloyDB foreign data wrapper.
    statement: |
      SELECT a.allergen_name
      FROM consistsof c
      INNER JOIN product p ON c.product_id = p.product_id
      INNER JOIN ingredient i ON c.ingredient_id = i.ingredient_name
      INNER JOIN containsallergen a ON i.ingredient_id = a.ingredient_id
      WHERE UPPER(p.product_name) LIKE UPPER($1)
    parameters:
      - name: product_name
        type: string
        description: >
          The name of the froyo product to check allergens for.
          Use wildcard format e.g. '%Midnight%' for partial matching.

  place_order:
    kind: postgres-sql
    source: alloydb-source
    description: >
      Inserts a new live transaction into the native AlloyDB orders table.
      Demonstrates HTAP — transactional write while analytical reads
      happen simultaneously via BigQuery federation.
    statement: |
      INSERT INTO live_orders (customer_name, product_id, quantity)
      VALUES (
        $1,
        (SELECT product_id FROM product
         WHERE product_name ILIKE '%' || $2 || '%' LIMIT 1),
        $3
      ) RETURNING order_id;
    parameters:
      - name: customer_name
        type: string
        description: Full name of the customer placing the order.
      - name: product_name
        type: string
        description: Name of the froyo product being ordered.
      - name: quantity
        type: integer
        description: Number of units being ordered.

toolsets:
  alloydb_tools:
    - check_allergens
    - place_order
